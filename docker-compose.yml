services:
  db:
    image: postgres:15
    container_name: insight_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: insight_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - insight_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d insight_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    container_name: insight_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - insight_network

  app:
    build: .
    container_name: insight_app
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - insight_network

networks:
  insight_network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_storage: